<!doctype html>
<html><head><meta charset="utf-8"><title>iBlock Settings</title><link rel="stylesheet" href="options.css"></head>
<body>
  <main>
    <h1>iBlock Settings</h1>
    <section class="card">
      <label><input type="checkbox" id="enabled"> Enable blocking</label>
      <label><input type="checkbox" id="videoSafe"> Protect video players / block off-player ads only</label>
      <label>Default mode
        <select id="mode"><option value="regular">Regular</option><option value="super">Super</option></select>
      </label>
    </section>
    <section class="card">
      <h2>Whitelist <span id="count"></span></h2>
      <div class="row"><input id="newHost" placeholder="example.com"><button id="add">Add</button></div>
      <ul id="whitelist"></ul>
    </section>
    <section class="card">
      <h2>Video ad site log</h2>
      <p>Sites are stored once when likely off-player video-ad clutter is detected.</p>
      <button id="clearLog">Clear log</button>
      <ul id="log"></ul>
    </section>
  </main>
  <script src="options.js"></script>
</body></html>
